<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード生成ツール - 便利ツール集</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #d4d0c8;
            /* Windows 2000 灰色 */
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .window {
            width: 500px;
            margin: 0 auto;
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            padding: 2px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .title-bar {
            background-color: #000080;
            color: #ffffff;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .content {
            padding: 15px;
        }

        .pass-display {
            background-color: #ffffff;
            border: 2px inset #ffffff;
            padding: 10px;
            font-family: "Courier New", Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            word-break: break-all;
        }

        table.layout {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table.layout td {
            padding: 5px;
        }

        .label {
            width: 140px;
        }

        button {
            background-color: #d4d0c8;
            border: 2px outset #ffffff;
            padding: 3px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        button:active {
            border: 2px inset #ffffff;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            border-top: 1px solid #808080;
            padding-top: 10px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <span>🔑 パスワード生成ツール Ver 1.0</span>
            <span style={{fontSize: '10px' }}>×</span>
        </div>
        <div class="content">
            <div id="root"></div>
        </div>
    </div>

    <div class="footer">
        [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
    </div>

    <script type="text/babel">
        const App = () => {
            const [password, setPassword] = React.useState('');
            const [length, setLength] = React.useState(12);
            const [useUpper, setUseUpper] = React.useState(true);
            const [useNumbers, setUseNumbers] = React.useState(true);
            const [useSymbols, setUseSymbols] = React.useState(false);

            const generate = () => {
                const lower = 'abcdefghijklmnopqrstuvwxyz';
                const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const numbers = '0123456789';
                const symbols = '!@#$%^&*()';

                let chars = lower;
                if (useUpper) chars += upper;
                if (useNumbers) chars += numbers;
                if (useSymbols) chars += symbols;

                let pw = '';
                const array = new Uint32Array(length);
                window.crypto.getRandomValues(array);
                for (let i = 0; i < length; i++) {
                    pw += chars[array[i] % chars.length];
                }
                setPassword(pw);
            };

            const copy = () => {
                navigator.clipboard.writeText(password);
                alert("クリップボードにコピーしました！");
            };

            React.useEffect(() => { generate(); }, []);

            return (
                <div>
                    <div class="pass-display">{password}</div>

                    <table class="layout">
                        <tr>
                            <td class="label">文字数：</td>
                            <td>
                                <input type="number" value={length} onChange={(e) => setLength(Number(e.target.value))} style={{ width: '50px' }} />
                                <span style={{ fontSize: '11px', color: '#666', marginLeft: '5px' }}>(4-32)</span>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <label><input type="checkbox" checked={useUpper} onChange={() => setUseUpper(!useUpper)} /> 英大文字を含める</label><br />
                                <label><input type="checkbox" checked={useNumbers} onChange={() => setUseNumbers(!useNumbers)} /> 数字を含める</label><br />
                                <label><input type="checkbox" checked={useSymbols} onChange={() => setUseSymbols(!useSymbols)} /> 記号を含める</label>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" style={{ textAlign: 'center', paddingTop: '15px' }}>
                                <button onClick={generate}>⚡ パスワード生成</button>
                                <button onClick={copy} style={{ marginLeft: '10px' }}>📋 コピー</button>
                            </td>
                        </tr>
                    </table>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/5dfe8bfce49a43ffe78096b109972b5b"></script>
    <!-- admax -->
</body>

</html>
